name: Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Extract Firebase config and create .env
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > service-account.json
          echo "REACT_APP_FIREBASE_API_KEY=$(jq -r '.firebaseConfig.apiKey' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_AUTH_DOMAIN=$(jq -r '.firebaseConfig.authDomain' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_PROJECT_ID=$(jq -r '.firebaseConfig.projectId' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_STORAGE_BUCKET=$(jq -r '.firebaseConfig.storageBucket' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_MESSAGING_SENDER_ID=$(jq -r '.firebaseConfig.messagingSenderId' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_APP_ID=$(jq -r '.firebaseConfig.appId' service-account.json)" >> .env
          echo "REACT_APP_FIREBASE_MEASUREMENT_ID=$(jq -r '.firebaseConfig.measurementId' service-account.json)" >> .env

      - name: Build React app
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
